<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChickenChickenCome</title>

<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">

<style>

:root{
  --bg:#0f1117;
  --card:#1a1d29;
  --text:#ffffff;
  --button:#4f7cff;
}

.light{
  --bg:#f4f4f4;
  --card:#ffffff;
  --text:#111111;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,
body{
  width:100%;
  overflow-x:hidden;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:var(--bg);
  color:var(--text);
  font-family:Arial,sans-serif;
  transition:.25s;
}

.container{
  width:100%;
  max-width:650px;
  padding:20px;
  text-align:center;
}

.theme-btn{
  border:none;
  background:var(--card);
  color:var(--text);
  padding:10px 16px;
  border-radius:999px;
  cursor:pointer;
  margin-bottom:20px;
}

.logo{
  font-size:72px;
}

.title{
  font-size:clamp(26px,7vw,42px);
  font-weight:bold;
  white-space:nowrap;
  margin:10px 0 25px;
}

.search-box{
  display:flex;
  background:var(--card);
  border-radius:999px;
  padding:6px;
}

.search-box input{
  flex:1;
  border:none;
  outline:none;
  background:none;
  color:var(--text);
  padding:14px;
  min-width:0;
  font-size:16px;
}

.search-box button{
  border:none;
  background:var(--button);
  color:white;
  border-radius:999px;
  padding:12px 18px;
  cursor:pointer;
}

.provider{
  margin-top:15px;
}

.provider select{
  width:220px;
  max-width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  background:var(--card);
  color:var(--text);
}

.footer{
  margin-top:25px;
  opacity:.7;
  font-size:13px;
}

</style>

</head>

<body>

<div class="container">

<button
class="theme-btn"
id="themeBtn"
onclick="toggleTheme()">
🌙 Dark Mode
</button>

<div class="logo">🐔</div>

<div class="title">
ChickenChickenCome
</div>

<div class="search-box">

<input
id="query"
placeholder="Search the web..."
onkeydown="if(event.key==='Enter')search()">

<button onclick="search()">
Search
</button>

</div>

<div class="provider">

<select id="provider">
<option value="google">Google</option>
<option value="bing">Bing</option>
<option value="duck">DuckDuckGo</option>
<option value="brave">Brave Search</option>
</select>

</div>

<div class="footer">
Powered by NeonSamurai Industries™
</div>

</div>

<script>

function search(){

 let q =
 document.getElementById("query").value.trim();

 let p =
 document.getElementById("provider").value;

 if(!q) return;

 let url="";

 if(p==="google")
 url="https://www.google.com/search?q="+encodeURIComponent(q);

 if(p==="bing")
 url="https://www.bing.com/search?q="+encodeURIComponent(q);

 if(p==="duck")
 url="https://duckduckgo.com/?q="+encodeURIComponent(q);

 if(p==="brave")
 url="https://search.brave.com/search?q="+encodeURIComponent(q);

 location.href=url;
}

function toggleTheme(){

 document.body.classList.toggle("light");

 const btn =
 document.getElementById("themeBtn");

 if(document.body.classList.contains("light")){
   btn.innerHTML="☀️ Light Mode";
 }else{
   btn.innerHTML="🌙 Dark Mode";
 }
}

/* Service Worker Registration */

if("serviceWorker" in navigator){

 window.addEventListener("load", () => {

  navigator.serviceWorker
   .register("./sw.js")
   .then(() => {
    console.log("SW Registered");
   })
   .catch(err => {
    console.log(err);
   });

 });

}

</script>

</body>
</html>
